async function buscarMejorZona() {

    alert("Analizando toda la zona cercana...");

    const centro = map.getCenter();

    let mejorScore = 0;
    let mejorLat = null;
    let mejorLng = null;

    // probar 12 puntos alrededor
    for (let i = 0; i < 12; i++) {

        const lat = centro.lat + (Math.random() - 0.5) * 0.02;
        const lng = centro.lng + (Math.random() - 0.5) * 0.02;

        await fetchNegocios(lat, lng);

        const competenciaReal = negocios.length;

        const score = Math.max(20, 100 - competenciaReal * 8);

        if (score > mejorScore) {

            mejorScore = score;
            mejorLat = lat;
            mejorLng = lng;

        }
    }

    if (mejorLat && mejorLng) {

        const icon = L.icon({
            iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
            iconSize: [32,32]
        });

        L.marker([mejorLat, mejorLng], { icon })
            .addTo(map)
            .bindPopup(`
                <b>MEJOR UBICACIÓN DETECTADA</b><br>
                Score: ${mejorScore.toFixed(1)}%
            `)
            .openPopup();

        map.setView([mejorLat, mejorLng], 15);
L.circle([mejorLat, mejorLng], {
    radius: 500,
    color: "green",
    fillColor: "#22c55e",
    fillOpacity: 0.15
}).addTo(map);
    }

}

async function fetchNegocios(lat, lng, radio = 500) {
    try {

        const codigo = mapaSCIAN[currentBusiness];

        if (codigo) {

        mostrarNegociosEnLista();
        mostrarNegociosEnMapa();
mostrarHeatmap();
    } catch (err) {
        console.error("Error al cargar negocios:", err);
    }
}

    `)

        permanent: false,
        direction: "top"
    });

function detectarMejorPuntoAutomatico() {

    if (!markerA || !markerB) return;

    const scoreA = pointA ?? 0;
    const scoreB = pointB ?? 0;

    if (scoreA > scoreB) {

        markerA.setIcon(new L.Icon.Default());

        markerB.setIcon(new L.Icon({
            iconUrl: "https://maps.google.com/mapfiles/ms/icons/gray-dot.png",
            iconSize: [32,32]
        }));

    } else if (scoreB > scoreA) {

        markerB.setIcon(new L.Icon.Default());

        markerA.setIcon(new L.Icon({
            iconUrl: "https://maps.google.com/mapfiles/ms/icons/gray-dot.png",
            iconSize: [32,32]
        }));

    }
}

    competenciaScore = 95;
}
else if (competenciaReal <= 7) {
    competenciaScore = 85;
}
else if (competenciaReal <= 12) {
    competenciaScore = 65;
}
else if (competenciaReal <= 20) {
    competenciaScore = 45;
    penalizacionSaturacion = 10;
}
else {
    competenciaScore = 30;
    penalizacionSaturacion = 20;
}

locationData.competencia = competenciaScore;

// 🔥 DEMANDA ESTIMADA (peatonal + nivel socioeconómico)
let demandaScore = (
    locationData.peatonal * 0.6 +
    locationData.nivel * 0.4
);

// 🔥 COSTO DE RENTA (penaliza renta alta)
let penalizacionRenta = 0;
if (locationData.renta > 75) penalizacionRenta = 10;
if (locationData.renta > 85) penalizacionRenta = 18;

// 🔥 SCORE BASE POR PESOS SCIAN
let weights = businessWeights[currentBusiness];
let scoreBase = 0;

Object.keys(weights).forEach(key => {
    scoreBase += weights[key] * locationData[key];
});

// 🔥 SCORE FINAL REALISTA
let score =
    (scoreBase * 0.5) +
    (demandaScore * 0.2) +
    (locationData.accesibilidad * 0.1) +
    (locationData.seguridad * 0.1) +
    (competenciaScore * 0.1)
    - penalizacionSaturacion
    - penalizacionZonaMuerta
    - penalizacionRenta;

// 🔥 límites
score = Math.max(10, Math.min(98, score));



    mostrarResultado(score);
    mostrarComparacion();

}

function mostrarResultado(score) {

    const bar = document.getElementById("score-bar");

    const colorClass = getScoreColor(scoreFormatted).split(' ')[0];
    const textColorClass = getScoreColor(scoreFormatted).split(' ')[1];

    bar.style.width = "0%";

    setTimeout(() => {
        bar.className = `h-full transition-all duration-1000 ease-out ${colorClass}`;
        bar.style.width = scoreFormatted + "%";
    }, 50);

    scoreText.innerText = scoreFormatted + "%";
    scoreText.className = `text-4xl font-black ${textColorClass}`;

    document.getElementById("result-placeholder").classList.add("hidden");
   document.getElementById("result-content").classList.remove("hidden");

// 🔥 GUARDAR SCORE EN CADA PUNTO
if (currentPoint === "A") {

} else if (currentPoint === "B") {

}

// 🔥 detectar mejor punto visualmente

        </div>

        <div class="flex justify-between bg-gray-50 p-2 rounded">
            <span>Seguridad</span>
            <span class="font-bold">${locationData.seguridad}%</span>
        </div>

        <div class="flex justify-between bg-gray-50 p-2 rounded">
            <span>Nivel socioeconómico</span>
            <span class="font-bold">${locationData.nivel}%</span>
        </div>

    </div>
`;
mostrarComparacion();

}
     function mostrarComparacion() {

    if (pointA !== null && pointB !== null) {

        let recomendacion;
        let mejorPunto;

        if (pointA > pointB) {
            mejorPunto = "A";
        } else if (pointB > pointA) {

}


        function calculateROI() {
            const inversion = parseFloat(document.getElementById("input-inversion").value);
            const ventas = parseFloat(document.getElementById("input-ventas").value);

            if (!inversion || !ventas || inversion <= 0 || ventas <= 0) {
                document.getElementById("roi-result").innerHTML = `
                    <div class="p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                        Por favor, ingresa montos válidos mayores a cero.
                    </div>`;
                return;
            }

            const renta = ventas * 0.10;
            const margen = ventas * 0.40;
            const utilidadMensual = margen - renta;
            
            if (utilidadMensual <= 0) {
                 document.getElementById("roi-result").innerHTML = `
                    <div class="p-3 bg-red-100 text-red-700 rounded-lg text-sm">
                        La utilidad proyectada es negativa. Revisa tus ventas.
                    </div>`;
                return;
            }

            const utilidadAnual = utilidadMensual * 12;
            const roi = ((utilidadAnual / inversion) * 100).toFixed(1);
            const mesesRecuperacion = (inversion / utilidadMensual).toFixed(1);
            const añosRecuperacion = (mesesRecuperacion / 12).toFixed(1);

            // Formato mejorado de resultados financieros (Mejora Visual)
            document.getElementById("roi-result").innerHTML = `
                <div class="flex flex-col gap-2 text-sm text-gray-700 mt-2">
                    <div class="flex justify-between bg-blue-50 p-2.5 rounded-lg border border-blue-100">
                        <span>ROI Anual Estimado:</span>
                        <span class="font-black text-app-blue">${roi}%</span>
                    </div>
                    <div class="flex justify-between bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                        <span>Punto de Equilibrio:</span>
                        <span class="font-bold text-gray-800">${mesesRecuperacion} meses</span>
                    </div>
                    <div class="flex justify-between bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                        <span>Recuperación Total:</span>
                        <span class="font-bold text-gray-800">${añosRecuperacion} años</span>
                    </div>
                </div>
            `;
        }

    }).filter(Boolean);

    heatLayer = L.heatLayer(puntos, {
